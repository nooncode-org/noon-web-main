name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit & integration tests
        run: npm test

      # Build runs without real secrets. All API routes are `dynamic = "force-dynamic"`
      # and read env vars lazily, so build-time env is not required for compilation.
      - name: Build
        run: npm run build
        env:
          # Dummy AUTH_SECRET so NextAuth does not abort at module load.
          AUTH_SECRET: ci-build-only-not-used-at-runtime

      # Lint is intentionally omitted in this commit: the project still has
      # pre-existing lint errors that are cleaned in the next commit. Re-enabled
      # there together with the cleanup so each commit stays in a green state.
      #
      # - name: Lint
      #   run: npm run lint
